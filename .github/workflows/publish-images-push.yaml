name: Push build — always publish
on:
  push:
    branches:
      - main
    paths:
      - 'base/**'
      - 'scripts/**'
      - 'libexec/**'
      - 'yorha'

env:
  OCI_REGISTRY: ghcr.io
  GH_ACCOUNT: ${{ github.actor }}
  GH_PROJECT: ${{ github.event.repository.name }}
  OSTREE_STATEROOT: cache22
  DEFAULT_BASE: cachyos

jobs:
  build-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check available disk space
        run: df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Login to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login --username "${{ github.actor }}" --password-stdin $OCI_REGISTRY

      - name: Build container images and publish
        run: |
          sed -i "0,/localhost/s/localhost/$OCI_REGISTRY/" libexec/yorha-config
          sed -i "s|IMAGE=localhost|IMAGE=$OCI_REGISTRY/$GH_ACCOUNT|g" base/$DEFAULT_BASE/Containerfile.cache22
          ./yorha compose container-base
          ./yorha compose container
          for _image in $OCI_REGISTRY/$GH_ACCOUNT/$GH_PROJECT/$DEFAULT_BASE-base \
            $OCI_REGISTRY/$GH_ACCOUNT/$GH_PROJECT/$DEFAULT_BASE; do
            podman push --compression-format zstd --compression-level 19 $_image
          done

      - name: Generate package list and changelog
        run: |
          podman run --rm --entrypoint /bin/bash \
            $OCI_REGISTRY/$GH_ACCOUNT/$GH_PROJECT/$DEFAULT_BASE:latest \
            -c "pacman -Q" | sort > /tmp/packages-new.txt

          if [ -f packages.txt ]; then
            cp packages.txt /tmp/packages-old.txt
          else
            touch /tmp/packages-old.txt
          fi

          python3 << 'PYEOF'
          from datetime import datetime

          with open('/tmp/packages-old.txt') as f:
              old = {line.split()[0]: line.split()[1] for line in f if line.strip()}

          with open('/tmp/packages-new.txt') as f:
              new = {line.split()[0]: line.split()[1] for line in f if line.strip()}

          added   = {k: new[k] for k in new if k not in old}
          removed = {k: old[k] for k in old if k not in new}
          changed = {k: (old[k], new[k]) for k in new if k in old and old[k] != new[k]}

          date = datetime.now().strftime('%Y-%m-%d %H:%M UTC')

          try:
              with open('CHANGELOG.md') as f:
                  existing = f.read()
          except FileNotFoundError:
              existing = ''

          entry = f'## {date}\n\n'

          if not added and not removed and not changed:
              entry += '_No package changes in this build._\n\n'
          else:
              if changed:
                  entry += '### Updated\n\n'
                  entry += '| Package | From | To |\n'
                  entry += '|---------|------|----|\n'
                  for pkg in sorted(changed):
                      entry += f'| `{pkg}` | {changed[pkg][0]} | {changed[pkg][1]} |\n'
                  entry += '\n'

              if added:
                  entry += '### Added\n\n'
                  entry += '| Package | Version |\n'
                  entry += '|---------|--------|\n'
                  for pkg in sorted(added):
                      entry += f'| `{pkg}` | {added[pkg]} |\n'
                  entry += '\n'

              if removed:
                  entry += '### Removed\n\n'
                  entry += '| Package | Version |\n'
                  entry += '|---------|--------|\n'
                  for pkg in sorted(removed):
                      entry += f'| `{pkg}` | {removed[pkg]} |\n'
                  entry += '\n'

          header = '# Cache22 Package Changelog\n\n'
          if existing.startswith(header):
              existing = existing[len(header):]

          with open('CHANGELOG.md', 'w') as f:
              f.write(header + entry + existing)

          print(f"Changes: {len(changed)} updated, {len(added)} added, {len(removed)} removed")
          PYEOF

          cp /tmp/packages-new.txt packages.txt

      - name: Commit package list and changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages.txt CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update package list and changelog [skip ci]"
          git push
